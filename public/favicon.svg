<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Warm off-white background with rounded corners -->
  <rect width="48" height="48" rx="10" fill="#f7f5ef"/>

  <!-- Sun circle (behind mountains) -->
  <circle cx="34" cy="19" r="7" fill="#e8c84a"/>

  <!-- Sun rays -->
  <g stroke="#e8c84a" stroke-width="1.6" stroke-linecap="round">
    <line x1="34" y1="9.5" x2="34" y2="7.5"/>
    <line x1="40.9" y1="12.1" x2="42.3" y2="10.7"/>
    <line x1="43.5" y1="19" x2="45.5" y2="19"/>
    <line x1="40.9" y1="25.9" x2="42.3" y2="27.3"/>
    <line x1="27.1" y1="12.1" x2="25.7" y2="10.7"/>
  </g>

  <!-- Back/right mountain (lighter green, partially behind main peak) -->
  <polygon points="20,40 35,17 50,40" fill="#7fc870" opacity="0.5"/>

  <!-- Left mountain -->
  <polygon points="-2,40 12,20 26,40" fill="#3d6b35"/>

  <!-- Main center peak (tallest, darkest) -->
  <polygon points="12,40 26,12 40,40" fill="#1a3300"/>

  <!-- Snow cap on main peak -->
  <polygon points="26,12 21.5,21 30.5,21" fill="#f7f5ef" opacity="0.88"/>

  <!-- Subtle ground strip -->
  <rect x="0" y="38.5" width="48" height="9.5" fill="#3d6b35" opacity="0.15"/>
</svg>
