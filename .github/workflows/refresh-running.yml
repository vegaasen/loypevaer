name: Refresh running events

on:
  schedule:
    # Run every Monday at 04:30 UTC (30 min after triathlon refresh)
    - cron: "30 4 * * 1"
  # Allow manual triggering from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    name: Fetch & commit running events
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Fetch running events
        run: bun run fetch-running

      - name: Commit updated events
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/running-events.json
          if git diff --cached --quiet; then
            echo "No changes to running events, skipping commit."
          else
            git commit -m "chore: refresh running events [$(date -u +%Y-%m-%d)]"
            git push
          fi
